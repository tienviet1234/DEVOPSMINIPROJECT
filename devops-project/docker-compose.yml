version: "3.9"

services:
  # ─── MongoDB Database ──────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: taskmanager-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: taskmanager
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - taskmanager-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── Backend ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskmanager-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      DB_URL: mongodb://mongo:27017/taskmanager
      APP_NAME: TaskManager
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - taskmanager-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskmanager-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - taskmanager-net

volumes:
  mongo-data:
    name: taskmanager-mongo-data

networks:
  taskmanager-net:
    name: taskmanager-network
    driver: bridge
